<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../res/favicon (3).png" sizes="32x32" type="image/png">
    <title>Kings and Pigs - Level Select</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap");

      :root {
        --bg-dark: #242234;
        --wood-light: #c08852;
        --wood-dark: #9a6038;
        --accent-peach: #e27b66;
        --accent-gold: #facc15;
        --ui-border: #2f242c;
        --text-main: #fce7df;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100vw;
        height: 100vh;
        background-color: var(--bg-dark);
        font-family: "Press Start 2P", monospace;
        image-rendering: pixelated;
        cursor: url("../res/pointer_a.svg"), auto;
      }

      /* --- Background Effects --- */
      video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: blur(2px) brightness(0.6);
        z-index: -2;
      }
      .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle,
          transparent 20%,
          rgba(0, 0, 0, 0.4) 100%
        );
        z-index: -1;
      }

      /* --- Main Level Board --- */
      .level-board {
        position: relative;
        background-color: var(--wood-light);
        border: 6px solid var(--ui-border);
        border-radius: 4px;
        box-shadow:
          0 20px 0px 0px rgba(0, 0, 0, 0.3),
          inset 6px 6px 0px #ddb27c,
          inset -6px -6px 0px var(--wood-dark);
        padding: 3rem 2rem 2rem 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        animation: boardEntry 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      @keyframes boardEntry {
        from {
          transform: translateY(50px) scale(0.9);
          opacity: 0;
        }
        to {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
      }

      /* --- Decorative Title Banner --- */
      .board-header {
        position: absolute;
        top: -25px;
        background: #cd683d;
        border: 4px solid var(--ui-border);
        padding: 10px 30px;
        box-shadow: 0 6px 0 var(--ui-border);
      }

      .board-title {
        color: var(--accent-gold);
        text-shadow: 3px 3px 0px var(--ui-border);
        font-size: 20px;
      }

      .board-content {
        display: flex;
        gap: 2.5rem;
        margin-top: 1rem;
      }

      /* --- Level Grid --- */
      .level-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
      }

      .level-btn {
        position: relative;
        width: 75px;
        height: 75px;
        background-color: var(--accent-peach);
        border: 4px solid var(--ui-border);
        border-radius: 4px;
        box-shadow:
          0 6px 0px var(--ui-border),
          inset 4px 4px 0px #f4a488;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        cursor: url("../res/hand_small_point.svg"), auto;
        transition: all 0.1s ease;
      }

      .level-btn:hover:not(.locked) {
        transform: translateY(-2px);
        box-shadow:
          0 8px 0px var(--ui-border),
          inset 4px 4px 0px #f4a488;
        filter: brightness(1.1);
      }

      .level-btn:active:not(.locked),
      .level-btn.selected {
        transform: translateY(4px);
        box-shadow:
          0 2px 0px var(--ui-border),
          inset 4px 4px 0px #bd5345;
      }

      .level-btn.selected {
        border-color: var(--accent-gold);
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0% {
          box-shadow:
            0 2px 0px var(--ui-border),
            0 0 0px 0px rgba(250, 204, 21, 0.5);
        }
        70% {
          box-shadow:
            0 2px 0px var(--ui-border),
            0 0 0px 10px rgba(250, 204, 21, 0);
        }
        100% {
          box-shadow:
            0 2px 0px var(--ui-border),
            0 0 0px 0px rgba(250, 204, 21, 0);
        }
      }

      .level-num {
        color: var(--text-main);
        text-shadow: 2px 2px 0px var(--ui-border);
        font-size: 22px;
        pointer-events: none;
      }
      .stars {
        margin-top: 5px;
        color: var(--accent-gold);
        font-size: 8px;
        letter-spacing: 1px;
        pointer-events: none;
      }

      .level-btn.locked {
        background-color: #5a5a5a;
        box-shadow:
          0 6px 0px var(--ui-border),
          inset 4px 4px 0px #7a7a7a;
        cursor: url("../res/disabled.svg"), auto;
        opacity: 0.8;
      }
      .level-btn.locked .level-num {
        color: #333;
        text-shadow: none;
      }

      /* --- Preview Panel (Parchment Style) --- */
      .preview-panel {
        width: 280px;
        background-color: #e4d0b1; /* Light parchment color */
        border: 4px solid var(--ui-border);
        border-radius: 2px;
        padding: 1.2rem;
        display: none;
        flex-direction: column;
        gap: 12px;
        box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.2);
        animation: slideIn 0.3s ease-out;
      }

      @keyframes slideIn {
        from {
          transform: translateX(20px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      .preview-img-container {
        width: 100%;
        height: 130px;
        background-color: var(--ui-border);
        border: 4px solid var(--wood-dark);
        overflow: hidden;
      }

      .preview-img-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .preview-stats {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 10px;
        background: rgba(0, 0, 0, 0.05);
        border-radius: 4px;
      }

      .stat-row {
        display: flex;
        justify-content: space-between;
        font-size: 9px;
        color: var(--wood-dark);
        border-bottom: 2px solid rgba(0, 0, 0, 0.1);
        padding-bottom: 5px;
      }

      .stat-value {
        color: #2f242c;
        font-weight: bold;
      }

      /* --- Play Button --- */
      .play-btn {
        background-color: #4ade80;
        border: 4px solid var(--ui-border);
        color: #fff;
        text-shadow: 2px 2px 0px var(--ui-border);
        font-family: inherit;
        padding: 15px;
        cursor: url("../res/hand_small_point.svg"), auto;
        box-shadow: 0 5px 0px var(--ui-border);
        margin-top: 5px;
      }

      .play-btn:hover {
        background-color: #22c55e;
        transform: translateY(-2px);
        box-shadow: 0 7px 0px var(--ui-border);
      }
      .play-btn:active {
        transform: translateY(3px);
        box-shadow: 0 2px 0px var(--ui-border);
      }

      .back-btn {
        margin-top: 2rem;
        background: none;
        border: none;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--text-main);
        font-family: inherit;
        font-size: 10px;
        cursor: url("../res/hand_small_point.svg"), auto;
        opacity: 0.7;
      }

      .back-btn:hover {
        opacity: 1;
        text-decoration: underline;
      }

      .mi-triangle-up {
        rotate: -90deg;
        width: 16px;
      }
    </style>
  </head>
  <body>
    <video
      src="../res/Screen Recording 2025-08-12 232001.mp4"
      autoplay
      muted
      loop
    ></video>
    <div class="overlay"></div>

    <div class="level-board">
      <div class="board-header">
        <h1 class="board-title">LEVEL SELECT</h1>
      </div>

      <div class="board-content">
        <div class="level-grid" id="levelGrid"></div>

        <div class="preview-panel" id="previewPanel">
          <!-- PREVIEW IMAGE TEMPORARILY DISABLED
          <div class="preview-img-container">
            <img
              id="pvImage"
              src="../res/level_data_25x15.png"
              alt="Level Preview"
            />
          </div>
          -->

          <div class="preview-stats">
            <div class="stat-row">
              <span>GOAL:</span>
              <span class="stat-value" id="pvGoal">DEFEAT PIGS</span>
            </div>
            <div class="stat-row">
              <span>BEST SCORE:</span>
              <span class="stat-value" id="pvScore">0000</span>
            </div>
            <div class="stat-row">
              <span>RECORD:</span>
              <span class="stat-value" id="pvTime">--:--</span>
            </div>
            <div class="stat-row">
              <span>RANK:</span>
              <span class="stat-value" id="pvStars">☆☆☆</span>
            </div>
          </div>

          <button class="play-btn" id="startLevelBtn">START LEVEL</button>
        </div>
      </div>

      <button class="back-btn" onclick="window.location.href = '../../index.html'">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          fill="currentColor"
          class="mi-solid mi-triangle-up"
          viewBox="0 0 24 24"
        >
          <path
            d="m21.74 18.03-8-14.02c-.77-1.34-2.72-1.34-3.48 0l-8 14.02C1.5 19.35 2.47 21 4 21h15.99c1.53 0 2.5-1.64 1.74-2.97Z"
          />
        </svg>
        BACK TO CASTLE
      </button>
    </div>

    <script>
      const TOTAL_LEVELS = 8;
      const levelGrid = document.getElementById("levelGrid");
      const previewPanel = document.getElementById("previewPanel");

      const pvScore = document.getElementById("pvScore");
      const pvTime = document.getElementById("pvTime");
      const pvStars = document.getElementById("pvStars");
      const startLevelBtn = document.getElementById("startLevelBtn");

      let selectedLevel = null;

      const defaultProgress = {
        1: {
          unlocked: true,
          stars: 3,
          score: 4500,
          time: "01:14",
          goal: "ESCAPE",
        },
        2: {
          unlocked: true,
          stars: 2,
          score: 2800,
          time: "02:30",
          goal: "DEFEAT BOSS",
        },
        3: {
          unlocked: true,
          stars: 0,
          score: 0,
          time: "--:--",
          goal: "COLLECT GEMS",
        },
      };

      const playerProgress =
        JSON.parse(localStorage.getItem("kings_pigs_progress")) ||
        defaultProgress;

      // NEW: Fetch the custom levels to see which ones actually exist!
      const customLevels = 
        JSON.parse(localStorage.getItem("kings_pigs_custom_levels")) || {};

      for (let i = 1; i <= TOTAL_LEVELS; i++) {
        const levelData = playerProgress[i];
        let isUnlocked = levelData && levelData.unlocked;

        // ==========================================
        // BUG FIX: Prevent 404 Crashes
        // If it's not Level 1, and there is no custom map saved in memory, 
        // force the level to be LOCKED so the player can't click it!
        // ==========================================
        if (i !== 1 && !customLevels[i]) {
          isUnlocked = false; 
        }

        const stars = levelData ? levelData.stars : 0;

        const btn = document.createElement("div");
        btn.className = `level-btn ${isUnlocked ? "" : "locked"}`;

        let starHtml = "";
        if (isUnlocked) {
          const filledStars = "★".repeat(stars);
          const emptyStars = "☆".repeat(3 - stars);
          starHtml = `<span class="stars">${filledStars}${emptyStars}</span>`;
        } else {
          starHtml = `<span class="stars" style="color:#333">LOCKED</span>`;
        }

        btn.innerHTML = `<span class="level-num">${i}</span>${starHtml}`;

        if (isUnlocked) {
          btn.addEventListener("click", () => {
            // Visual feedback
            document
              .querySelectorAll(".level-btn")
              .forEach((b) => b.classList.remove("selected"));
            btn.classList.add("selected");

            // Update Data
            pvScore.innerText = String(levelData.score).padStart(4, "0");
            pvTime.innerText = levelData.time || "--:--";
            document.getElementById("pvGoal").innerText =
              levelData.goal || "SURVIVE";

            const filledStars = "★".repeat(stars);
            const emptyStars = "☆".repeat(3 - stars);
            pvStars.innerText = filledStars + emptyStars;

            previewPanel.style.display = "flex";
            selectedLevel = i;
          });
        }

        levelGrid.appendChild(btn);
      }

      startLevelBtn.addEventListener("click", () => {
        if (selectedLevel) {
          window.location.href = `./game.html?level=${selectedLevel}`;
        }
      });
    </script>
  </body>
</html>
