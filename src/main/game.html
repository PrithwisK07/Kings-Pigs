<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="../res/favicon (3).png"
      sizes="32x32"
      type="image/png"
    />
    <title>Kings & Pigs</title>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      width: 100vw;
      height: 100vh;

      background-color: #3e3750;
    }

    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #242234;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999999;
      transition: opacity 0.4s ease;
      font-family: "Press Start 2P", monospace;
    }
    .loader-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .loader-title {
      color: #facc15;
      font-size: 18px;
      text-shadow: 3px 3px 0px #2f242c;
    }
    /* Wooden Container */
    .pixel-progress-bar {
      width: 300px;
      height: 30px;
      background-color: #9a6038;
      border: 4px solid #2f242c;
      box-shadow:
        inset 4px 4px 0px #2f242c,
        inset -4px -4px 0px #c08852;
      padding: 4px;
    }
    /* Green Energy Fill */
    .pixel-progress-fill {
      width: 0%;
      height: 100%;
      background-color: #4ade80;
      box-shadow:
        inset 4px 4px 0px #bbf7d0,
        inset -4px -4px 0px #16a34a;
      transition: width 0.2s ease-out; /* Snappy filling animation */
    }
    .loader-status {
      color: #fce7df;
      font-size: 10px;
    }

    #level-cleared-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(36, 34, 52, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999998;
      font-family: "Press Start 2P", monospace;
      backdrop-filter: blur(4px);
    }
    .cleared-board {
      background-color: #c08852;
      border: 6px solid #2f242c;
      border-radius: 4px;
      box-shadow:
        0 20px 0px 0px rgba(0, 0, 0, 0.3),
        inset 6px 6px 0px #ddb27c,
        inset -6px -6px 0px #9a6038;
      padding: 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      animation: dropIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes dropIn {
      0% {
        transform: translateY(-100vh);
      }
      100% {
        transform: translateY(0);
      }
    }
    .cleared-title {
      color: #facc15;
      font-size: 24px;
      text-shadow: 3px 3px 0px #2f242c;
    }
    .cleared-stats {
      width: 100%;
      background: rgba(0, 0, 0, 0.1);
      padding: 1rem;
      border-radius: 4px;
    }
    .continue-btn {
      background-color: #4ade80;
      border: 4px solid #2f242c;
      color: #fff;
      text-shadow: 2px 2px 0px #2f242c;
      font-family: inherit;
      font-size: 16px;
      padding: 15px 30px;
      cursor: pointer;
      box-shadow: 0 5px 0px #2f242c;
    }
    .continue-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0px #2f242c;
    }

    #game-over-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(36, 34, 52, 0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999998;
      font-family: "Press Start 2P", monospace;
      backdrop-filter: blur(4px);
    }
    .game-over-board {
      background-color: #2f242c;
      border: 6px solid #ef4444; /* Blood red border */
      border-radius: 4px;
      box-shadow:
        0 20px 0px 0px rgba(0, 0, 0, 0.5),
        inset 6px 6px 0px #4a3544;
      padding: 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      animation: fadeInScale 0.4s ease-out;
    }
    @keyframes fadeInScale {
      0% {
        opacity: 0;
        transform: scale(0.8);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }
    .game-over-title {
      color: #ef4444;
      font-size: 32px;
      text-shadow: 4px 4px 0px #000;
      margin: 0;
    }
    .game-over-subtitle {
      color: #fce7df;
      font-size: 10px;
      margin-bottom: 1rem;
      opacity: 0.8;
    }
    .game-over-actions {
      display: flex;
      gap: 1rem;
    }
    .action-btn {
      border: 4px solid #000;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      padding: 15px 20px;
      cursor: pointer;
      box-shadow: 0 5px 0px #000;
      transition:
        transform 0.1s,
        box-shadow 0.1s;
    }
    .retry-btn {
      background-color: #ef4444;
    }
    .retry-btn:hover {
      background-color: #dc2626;
    }
    .menu-btn {
      background-color: #5a5a5a;
    }
    .menu-btn:hover {
      background-color: #404040;
    }

    .action-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0px #000;
    }
  </style>
  <body>
    <div id="loading-screen">
      <div class="loader-box">
        <h1 class="loader-title">ENTERING KINGDOM...</h1>

        <div class="pixel-progress-bar">
          <div class="pixel-progress-fill" id="load-fill"></div>
        </div>

        <p class="loader-status" id="load-status">Waking up pigs...</p>
      </div>
    </div>

    <div id="level-cleared-screen" style="display: none">
      <div class="cleared-board">
        <h1 class="cleared-title">LEVEL CLEARED!</h1>

        <div class="cleared-stats">
          <div class="stat-row">
            <span>TIME:</span>
            <span class="stat-value" id="clear-time">00:00</span>
          </div>
          <div class="stat-row">
            <span>GEMS:</span>
            <span class="stat-value" id="clear-gems">0</span>
          </div>
        </div>

        <button class="continue-btn" id="btn-continue">CONTINUE</button>
      </div>
    </div>

    <div id="game-over-screen" style="display: none">
      <div class="game-over-board">
        <h1 class="game-over-title">YOU DIED</h1>
        <p class="game-over-subtitle">The pigs got the best of you...</p>

        <div class="game-over-actions">
          <button class="action-btn retry-btn" id="btn-retry">
            RETRY LEVEL
          </button>
          <button class="action-btn menu-btn" id="btn-menu">MAIN MENU</button>
        </div>
      </div>
    </div>

    <canvas></canvas>
    <script>
      document.addEventListener("keydown", (e) => {
        if (e.key == "Escape") {
          window.location.href = "../../index.html";
        }
      });
    </script>
    <script type="module" src="./Main.js"></script>
  </body>
</html>
