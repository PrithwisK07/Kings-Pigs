<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../res/favicon (3).png" sizes="32x32" type="image/png">
    <title>Kings & Pigs</title>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      width: 100vw;
      height: 100vh;

      background-color: #3e3750;
    }

    #loading-screen {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background-color: #242234;
        display: flex; justify-content: center; align-items: center;
        z-index: 999999; transition: opacity 0.4s ease;
        font-family: 'Press Start 2P', monospace;
      }
      .loader-box {
        display: flex; flex-direction: column; align-items: center; gap: 20px;
      }
      .loader-title {
        color: #facc15; font-size: 18px; text-shadow: 3px 3px 0px #2f242c;
      }
      /* Wooden Container */
      .pixel-progress-bar {
        width: 300px; height: 30px;
        background-color: #9a6038;
        border: 4px solid #2f242c;
        box-shadow: inset 4px 4px 0px #2f242c, inset -4px -4px 0px #c08852;
        padding: 4px;
      }
      /* Green Energy Fill */
      .pixel-progress-fill {
        width: 0%; height: 100%;
        background-color: #4ade80;
        box-shadow: inset 4px 4px 0px #bbf7d0, inset -4px -4px 0px #16a34a;
        transition: width 0.2s ease-out; /* Snappy filling animation */
      }
      .loader-status {
        color: #fce7df; font-size: 10px;
      }
  </style>
  <body>
    <div id="loading-screen">
      <div class="loader-box">
        <h1 class="loader-title">ENTERING KINGDOM...</h1>
        
        <div class="pixel-progress-bar">
          <div class="pixel-progress-fill" id="load-fill"></div>
        </div>
        
        <p class="loader-status" id="load-status">Waking up pigs...</p>
      </div>
    </div>

    <canvas></canvas>
    <script>
      document.addEventListener("keydown", (e) => {
        if (e.key == "Escape") {
          window.location.href = "../../index.html";
        }
      });
    </script>
    <script type="module" src="./Main.js"></script>
  </body>
</html>
