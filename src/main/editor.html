<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tile Editor</title>
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/sidebar.css" />
    <link rel="stylesheet" href="./css/canvas.css" />
    <link rel="stylesheet" href="./css/optn.css" />
  </head>
  <body>
    <div class="container">
      <!-- Left Sidebar -->
      <div class="left-sidebar">
        <p style="margin-top: 0.75rem">TileSet</p>
        <div class="tileSet"></div>
        <p style="margin-top: 2rem">Enemies</p>
        <div class="Enemy"></div>
        <p style="margin-top: 2rem">Objects</p>
        <div class="Objects"></div>
      </div>

      <!-- Sidebar Options -->
      <div class="left-sidebar-options"></div>

      <!-- Grid Size Modal -->
      <!-- Modal -->
      <div id="gridModal" class="modal">
        <div class="modal-content">
          <h2 class="modal-title">Create New Grid</h2>
          <p class="modal-subtitle">Enter the number of rows and columns</p>

          <div class="modal-inputs">
            <label>
              Rows:
              <input type="number" id="rowsInput" min="1" value="15" />
            </label>
            <label>
              Columns:
              <input type="number" id="colsInput" min="1" value="15" />
            </label>
          </div>

          <div class="modal-actions">
            <button id="confirmGrid" class="btn btn-primary">Confirm</button>
            <button id="cancelGrid" class="btn btn-secondary">Cancel</button>
          </div>
        </div>
      </div>

      <!-- Main Canvas -->
      <div class="canvas-container">
        <div class="zoom-wrapper">
          <div class="upper-num"></div>
          <div class="inner-canvas-container">
            <div class="left-num"></div>
            <div class="canvas">
              <div class="grid-mask"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Options Sidebar -->
      <div class="options-sidebar">
        <span class="load">
          <label for="import-file" style="cursor: pointer; display: flex; flex-direction: column; align-items: center;">
            <button style="pointer-events: none;">Load</button>
          </label>
          <input type="file" id="import-file" accept="image/png" style="display: none;" />
        </span>

        <span id="save">
          <img src="../res/floppy-drive.png" alt="save" />
          <div id="save-wrapper">
            <svg viewBox="0 0 100 100">
              <circle class="bg" cx="50" cy="50" r="45"></circle>
              <circle class="progress" cx="50" cy="50" r="45"></circle>
            </svg>
          </div>
        </span>
        <span class="grid">
          <button>grid</button>
        </span>
        <span class="eraser">
          <button>eraser</button>
        </span>
        <span class="back">
          <button>Scroll to content</button>
        </span>
      </div>
    </div>

    <!-- Scripts -->
    <script src="./js/utils.js" type="module"></script>
    <script src="./js/tiles.js" type="module"></script>
    <script src="./js/enemies.js" type="module"></script>
    <script src="./js/objects.js" type="module"></script>
    <script src="./js/floating.js" type="module"></script>
    <script src="./js/canvas.js" type="module"></script>
    <script src="./js/zoom.js" type="module"></script>
    <script src="./js/history.js" type="module"></script>
    <script src="./js/options.js" type="module"></script>
    <script src="./js/mainEditor.js" type="module"></script>
  </body>
</html>
