<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../res/favicon (3).png" sizes="32x32" type="image/png">
    <title>Tile Editor</title>
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/sidebar.css" />
    <link rel="stylesheet" href="./css/canvas.css" />
    <link rel="stylesheet" href="./css/optn.css" />
  </head>
  <body>
    <div class="container">
      <div class="left-sidebar" id="leftSidebar">
        <button id="sidebarToggle" class="sidebar-toggle"></button>

        <p>TileSet</p>
        <div class="tileSet"></div>

        <p>Enemies</p>
        <div class="Enemy"></div>

        <p>Objects</p>
        <div class="Objects"></div>
      </div>

      <!-- Sidebar Options -->
      <div class="left-sidebar-options"></div>

      <!-- Grid Size Modal -->
      <div id="gridModal" class="modal">
        <div class="modal-content">
          <div class="modal-controls">
            <h2 class="modal-title">Create New Grid</h2>
            <p class="modal-subtitle">Enter dimensions</p>

            <div class="modal-inputs">
              <label>
                Rows:
                <input
                  type="number"
                  id="rowsInput"
                  min="1"
                  max="50"
                  value="15"
                />
              </label>
              <label>
                Columns:
                <input
                  type="number"
                  id="colsInput"
                  min="1"
                  max="50"
                  value="15"
                />
              </label>
            </div>

            <div class="modal-actions">
              <button id="confirmGrid" class="btn btn-primary">Confirm</button>
              <button id="cancelGrid" class="btn btn-secondary">Cancel</button>
            </div>
          </div>

          <div class="modal-preview">
            <div class="preview-box">
              <div id="miniGrid"></div>
            </div>
            <!-- <p id="previewText" class="preview-text">15 x 15</p> -->
          </div>
        </div>
      </div>

      <!-- Main Canvas -->
      <div class="canvas-container">
        <div class="zoom-wrapper">
          <div class="upper-num"></div>
          <div class="inner-canvas-container">
            <div class="left-num"></div>
            <div class="canvas">
              <div class="grid-mask"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Options Sidebar -->
      <div class="options-sidebar">
        <button class="tool-btn load">Load</button>

        <button class="tool-btn save" id="save-wrapper">
          <img src="../res/floppy-drive.png" alt="save" class="save-icon" />
          <span>Save</span>
        </button>

        <button class="tool-btn grid-btn">Grid</button>

        <button class="tool-btn eraser-btn">Erase</button>

        <button class="tool-btn back">Reset<br />View</button>

        <button class="tool-btn" onclick="window.location.href='../../index.html'"> Back </button>
      </div>
    </div>

    <!-- MAIN LOAD MODAL -->
    <div id="loadModal" class="modal" style="display: none">
      <div class="modal-content">
        <div class="modal-controls">
          <h2 class="modal-title">Load Level</h2>
          <p class="modal-subtitle">Choose a source to import your map</p>

          <div class="load-options">
            <label for="import-file" class="tool-btn load-choice">
              <img
                src="../res/folders_5464646.png"
                alt="folder"
                class="load-icon"
              />
              <span>Computer</span>
            </label>

            <button class="tool-btn load-choice disabled" title="Coming soon!">
              <img
                src="../res/folder_13951801.png"
                alt="browser"
                class="load-icon"
              />
              <span>Cloud</span>
            </button>
          </div>

          <div class="modal-actions">
            <button id="closeLoadModal" class="btn btn-secondary">
              Cancel
            </button>
          </div>
        </div>
      </div>
      <input
        type="file"
        id="import-file"
        accept="image/png"
        style="display: none"
      />
    </div>

    <!-- NEW: SAVE LEVEL MODAL -->
    <div id="saveModal" class="modal" style="display: none">
      <div class="modal-content">
        <div class="modal-controls">
          <h2 class="modal-title">Save Level</h2>
          <p class="modal-subtitle">Enter a slot (1-8) to save to game memory, or leave blank to download the PNG only.</p>
          <div class="modal-inputs" style="justify-content: center; margin: 1rem 0;">
            <input type="number" id="saveSlotInput" min="1" max="8" placeholder="Slot #" style="width: 120px; text-align: center; padding: 10px; font-family: inherit;">
          </div>
          <div class="modal-actions">
            <button id="confirmSave" class="btn btn-primary">Save Level</button>
            <button id="cancelSave" class="btn btn-secondary">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <!-- NEW: LOAD MEMORY MODAL -->
    <div id="loadMemoryModal" class="modal" style="display: none">
      <div class="modal-content">
        <div class="modal-controls">
          <h2 class="modal-title">Load Custom Level</h2>
          <p class="modal-subtitle">Enter the memory slot (1-8) you want to edit.</p>
          <div class="modal-inputs" style="justify-content: center; margin: 1rem 0;">
            <input type="number" id="loadSlotInput" min="1" max="8" placeholder="Slot #" style="width: 120px; text-align: center; padding: 10px; font-family: inherit;">
          </div>
          <div class="modal-actions">
            <button id="confirmLoadMemory" class="btn btn-primary">Load Level</button>
            <button id="cancelLoadMemory" class="btn btn-secondary">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT CLICK CONTEXT MENU -->
    <div id="canvasContextMenu" class="context-menu" style="display: none;">
      <button id="cm-pickup">Pick Up Object</button>
      <button id="cm-flip">Flip Horizontally</button>
      <button id="cm-door-entry" class="door-opt">Make Entry Door</button>
      <button id="cm-door-exit" class="door-opt">Make Exit Door</button>
      <button id="cm-delete" style="color: #ef4444;">Delete</button>
    </div>

    <!-- NEW: TOAST NOTIFICATION CONTAINER -->
    <div id="toast" class="toast hidden">Message here</div>

    <!-- Scripts -->
    <script src="./js/utils.js" type="module"></script>
    <script src="./js/tiles.js" type="module"></script>
    <script src="./js/enemies.js" type="module"></script>
    <script src="./js/objects.js" type="module"></script>
    <script src="./js/floating.js" type="module"></script>
    <script src="./js/canvas.js" type="module"></script>
    <script src="./js/zoom.js" type="module"></script>
    <script src="./js/history.js" type="module"></script>
    <script src="./js/options.js" type="module"></script>
    <script src="./js/mainEditor.js" type="module"></script>
  </body>
</html>
