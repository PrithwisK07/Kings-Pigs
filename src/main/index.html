<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kings and Pigs - Menu</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        overflow: hidden;
        display: flex;
        justify-content: center; /* Centered horizontally */
        align-items: start;
        width: 100vw;
        height: 100vh;
        background-color: #242234;
        cursor: url("../res/pointer_a.svg"), auto;
      }

      .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
      }

      video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: blur(2px) brightness(0.6);
        z-index: -2;
      }

      .overlay > img.bg-img {
        width: 100%;
        height: 100%;
        position: absolute;
        opacity: 0.15; /* Changed from 0.2 to 0.15 to match level_selector */
        z-index: 0;
      }

      .overlay-inner {
        margin-top: 5rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        z-index: 1;
      }

      /* Replaced nth-child with specific classes for safety */
      .menu-board-img {
        position: absolute;
        margin-top: 10rem;
        scale: 1.5;
        z-index: 0;
        image-rendering: pixelated;
      }

      .menu-title-img {
        height: 4rem;
        position: relative;
        z-index: 2;
        image-rendering: pixelated;
      }

      /* ==========================================
         NEW: BUTTON CONTAINER & CSS PIXEL BUTTONS
         ========================================== */
      .button-container {
        position: relative;
        height: 40%;
        z-index: 2;
        margin-top: 11rem; /* Pushes buttons down onto the wooden board */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-around;
      }

      .menu-btn {
        font-family: "Press Start 2P", monospace;
        font-size: 14px;
        color: #f6c58b;
        text-shadow: 2px 2px 0px #33323d;
        background-color: #c08852; /* Base wood color */
        border: 4px solid #33323d; /* Dark brown border */
        border-radius: 4px;

        /* Magic Box-Shadow creates the 3D pixel highlights and shadows */
        box-shadow:
          inset 4px 4px 0px 0px #ddb27c,
          inset -4px -4px 0px 0px #9a6038,
          0 8px 0px 0px rgba(0, 0, 0, 0.2);

        padding: 16px 32px;
        cursor: url("../res/hand_small_point.svg"), auto;
        text-transform: uppercase;
        width: 250px;
        transition:
          transform 0.1s,
          box-shadow 0.1s,
          color 0.1s;
      }

      /* Hover State: Text lights up */
      .menu-btn:hover {
        background-color: #ce9965;
        color: #fce7df;
      }

      /* Pressed State: Button physically sinks down */
      .menu-btn:active {
        transform: translateY(4px);
        box-shadow:
          inset -4px -4px 0px 0px #ddb27c,
          inset 4px 4px 0px 0px #9a6038,
          0 4px 0px 0px rgba(0, 0, 0, 0.2);
      }

      img,
      video {
        user-select: none; /* Stops blue highlight selection */
        -webkit-user-select: none; /* Safari support */
        -webkit-user-drag: none; /* Stops the ghost dragging effect */
        pointer-events: none; /* Makes the mouse completely ignore them */
      }
    </style>
  </head>
  <body>
    <div>
      <video
        src="../res/Screen Recording 2025-08-12 232001.mp4"
        autoplay
        muted
        loop
      ></video>
      <div class="overlay">
        <div class="overlay-inner">
          <img
            src="../res/menu_background.png"
            alt="Menu_GB"
            class="menu-board-img"
          />
          <img
            src="../res/Kings and Pigs (3).png"
            alt="kingstitle"
            class="menu-title-img"
          />

          <div class="button-container">
            <button id="btn-play" class="menu-btn">Play</button>
            <button id="btn-editor" class="menu-btn">Editor</button>
            <button
              id="btn-quit"
              class="menu-btn"
              style="
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 16px;
              "
            >
              GitHub
              <img style="width: 30px" src="../res/GitHub.svg" alt="github" />
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      document.getElementById("btn-play").addEventListener("click", () => {
        window.location.href = "./level_selector.html";
      });

      document.getElementById("btn-editor").addEventListener("click", () => {
        window.location.href = "./editor.html";
      });

      document.getElementById("btn-quit").addEventListener("click", () => {
        window.open("https://www.github.com/PrithwisK07/Kings-Pigs", "_blank");
      });
    </script>
  </body>
</html>
